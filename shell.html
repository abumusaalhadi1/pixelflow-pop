        border-top: 5px solid red;
        border-radius: 100%;
        background-color: rgb(245, 245, 245);
      }

      @-webkit-keyframes rotation {
        from { -webkit-transform: rotate(0deg); }
        to { -webkit-transform: rotate(360deg); }
      }
      @-moz-keyframes rotation {
        from { -moz-transform: rotate(0deg); }
        to { -moz-transform: rotate(360deg); }
      }
      @-o-keyframes rotation {
        from { -o-transform: rotate(0deg); }
        to { -o-transform: rotate(360deg); }
      }
      @keyframes rotation {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      #status {
        display: inline-block;
        vertical-align: top;
        margin-top: 30px;
        margin-left: 20px;
        font-weight: bold;
        color: rgb(40, 40, 40);
      }

      #progress {
        height: 0px;
        width: 0px;
      }

      #controls {
        display: inline-block;
        float: right;
        vertical-align: top;
        margin-top: 15px;
        margin-right: 20px;
      }

      #output {
        width: 100%;
        height: 140px;
        margin: 0 auto;
        margin-top: 10px;
        display: block;
        background-color: black;
        color: rgb(37, 174, 38);
        font-family: "Lucida Console", Monaco, monospace;
        outline: none;
      }

      input[type=button] {
        background-color: lightgray;
        border: 4px solid darkgray;
        color: black;
        text-decoration: none;
        cursor: pointer;
        width: 140px;
        height: 50px;
        margin-left: 10px;
      }

      input[type=button]:hover {
        background-color: #f5f5f5ff;
        border-color: black;
      }
    </style>
  </head>
  <body>
    <div id="header">
      <div id="logo" aria-label="PixelFlow logo"></div>

      <div class="spinner" id="spinner"></div>
      <div class="emscripten" id="status">Downloading...</div>

      <span id="controls">
        <span><input type="button" value="📜 SOURCE CODE" onclick="window.open('https://github.com/abumusaalhadi1/pixelflow-pop', '_blank', 'noopener,noreferrer');"></span>
        <span><input type="button" value="🖵 FULLSCREEN" onclick="Module.requestFullscreen(false, false)"></span>
        <span><input type="button" id="btn-audio" value="🔇 MUTE" onclick="toggleAudio()"></span>
      </span>

      <div class="emscripten">
        <progress value="0" max="100" id="progress" hidden="1"></progress>
      </div>
    </div>

    <div class="emscripten_border">
      <canvas class="emscripten" id="canvas" width="800" height="600" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    </div>

    <textarea id="output" rows="8"></textarea>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/eligrey/FileSaver.js/dist/FileSaver.min.js"></script>
    <script type="text/javascript">
      function saveFileFromMEMFSToDisk(memoryFSname, localFSname) {
        var isSafari = false;
        var data = FS.readFile(memoryFSname);
        var blob;

        if (isSafari) blob = new Blob([data.buffer], { type: "application/octet-stream" });
        else blob = new Blob([data.buffer], { type: "application/octet-binary" });

        saveAs(blob, localFSname);
      }
    </script>
    <script type="text/javascript">
      var statusElement = document.querySelector("#status");
      var progressElement = document.querySelector("#progress");
      var spinnerElement = document.querySelector("#spinner");
      var Module = {
        preRun: [],
        postRun: [],
        print: (function() {
          var element = document.querySelector("#output");

          if (element) element.value = "";

          return function(text) {
            if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(" ");
            console.log(text);

            if (element) {
              element.value += text + "\n";
              element.scrollTop = element.scrollHeight;
            }
          };
        })(),
        printErr: function(text) {
          if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(" ");
          console.error(text);
        },
        canvas: (function() {
          var canvas = document.querySelector("#canvas");
          canvas.addEventListener("webglcontextlost", function(e) {
            alert("WebGL context lost. You will need to reload the page.");
            e.preventDefault();
          }, false);
          return canvas;
        })(),
        setStatus: function(text) {
          if (!Module.setStatus.last) Module.setStatus.last = { time: Date.now(), text: "" };
          if (text === Module.setStatus.last.text) return;

          var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
          var now = Date.now();

          if (m && now - Module.setStatus.last.time < 30) return;

          Module.setStatus.last.time = now;
          Module.setStatus.last.text = text;

          if (m) {
            text = m[1];
            progressElement.value = parseInt(m[2], 10) * 100;
            progressElement.max = parseInt(m[4], 10) * 100;
            progressElement.hidden = true;
            spinnerElement.hidden = false;
          } else {
            progressElement.value = null;
            progressElement.max = null;
            progressElement.hidden = true;
            if (!text) spinnerElement.style.display = "none";
          }

          statusElement.innerHTML = text;
        },
        totalDependencies: 0,
        monitorRunDependencies: function(left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
          Module.setStatus(
            left
              ? "Preparing... (" + (this.totalDependencies - left) + "/" + this.totalDependencies + ")"
              : "All downloads complete."
          );
        }
      };

      Module.setStatus("Downloading...");

      window.onerror = function() {
        Module.setStatus("Exception thrown, see JavaScript console");
        spinnerElement.style.display = "none";
        Module.setStatus = function(text) {
          if (text) Module.printErr("[post-exception status] " + text);
        };
      };
    </script>

    <script type="text/javascript">
      var audioBtn = document.querySelector("#btn-audio");
      var audioContextList = [];
      var isMuted = false;

      function setAudioButtonLabel() {
        audioBtn.value = isMuted ? "🔈 UNMUTE" : "🔇 MUTE";
      }

      (function() {
        self.AudioContext = new Proxy(self.AudioContext, {
          construct(target, args) {
            var result = new target(...args);
            audioContextList.push(result);
            if (result.state === "suspended") isMuted = true;
            if (isMuted && result.state === "running") result.suspend();
            setAudioButtonLabel();
            return result;
          }
        });
      })();

      function toggleAudio() {
        if (isMuted) {
          audioContextList.forEach(function(ctx) {
            if (ctx.state === "suspended") ctx.resume();
          });
          isMuted = false;
        } else {
          audioContextList.forEach(function(ctx) {
            if (ctx.state === "running") ctx.suspend();
          });
          isMuted = true;
        }
        setAudioButtonLabel();
      }

      setAudioButtonLabel();
    </script>

  </body>
